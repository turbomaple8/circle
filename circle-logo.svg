<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" role="img" aria-label="Circle Co-Living" style="background:transparent">
  <!-- Transparent background (no rect fill) -->
  <!-- Circle icon: outer 3/4 arc + inner soft disc + center dot -->
  <g transform="translate(8, 10)" fill="none" stroke="#6B4C3B" stroke-linecap="round">
    <path d="M 20 3 C 10.6 3 3 10.6 3 20 s 7.6 17 17 17 17-7.6 17-17" stroke-width="2"/>
    <circle cx="20" cy="20" r="5.5" fill="#6B4C3B" fill-opacity="0.22" stroke="none"/>
    <circle cx="20" cy="20" r="2.2" fill="#6B4C3B" stroke="none"/>
  </g>
  <!-- Wordmark: "circle" in Cormorant Garamond italic -->
  <text x="60" y="42" font-family="Cormorant Garamond, Georgia, serif" font-size="38" font-style="italic" font-weight="500" fill="#2D2420">circle</text>
</svg>
